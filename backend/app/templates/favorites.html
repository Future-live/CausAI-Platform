<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收藏夹</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="static/css/global-style.css">
    <style>
        .favorites-page {
            flex: 1;
            padding: 20px;
            background: #f6f8fc;
            overflow: auto;
        }

        .compact-sidebar {
            justify-content: flex-start;
            gap: 4px;
        }

        .compact-sidebar .user-info {
            margin-top: auto;
        }

        .favorites-hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            padding: 18px 20px;
            margin-bottom: 16px;
            background: #fff;
            border: 1px solid #e1e8f3;
            border-left: 4px solid #273c75;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(39, 60, 117, 0.08);
        }

        .favorites-hero h1 {
            margin: 0;
            color: #1f2a44;
            font-size: 26px;
            letter-spacing: 0;
        }

        .favorites-hero p {
            margin: 6px 0 0;
            color: #64748b;
            font-size: 13px;
        }

        .favorites-toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .favorites-filterbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            margin-bottom: 14px;
            background: #fff;
            border: 1px solid #e1e8f3;
            border-radius: 8px;
            box-shadow: 0 4px 14px rgba(39, 60, 117, 0.05);
        }

        .favorites-filterbar input,
        .favorites-filterbar select {
            height: 34px;
            padding: 0 10px;
            border: 1px solid #d7e0f1;
            border-radius: 6px;
            color: #27364f;
            background: #fbfcff;
            font-size: 13px;
            outline: none;
        }

        .favorites-filterbar input {
            width: min(280px, 42vw);
        }

        .favorites-filterbar input:focus,
        .favorites-filterbar select:focus {
            border-color: #273c75;
            box-shadow: 0 0 0 3px rgba(39, 60, 117, 0.1);
        }

        .favorites-toolbar button,
        .favorite-card button {
            border: none;
            border-radius: 6px;
            padding: 9px 13px;
            color: #fff;
            background: #273c75;
            font-weight: 800;
            cursor: pointer;
        }

        .favorites-toolbar button.secondary,
        .favorite-card button.secondary {
            color: #273c75;
            background: #eef3ff;
            border: 1px solid #d7e0f1;
        }

        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
        }

        .favorite-card {
            min-height: 160px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px;
            background: #fff;
            border: 1px solid #e1e8f3;
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(39, 60, 117, 0.06);
        }

        .favorite-card header {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .favorite-icon {
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
            border-radius: 10px;
            color: #fff;
            background: linear-gradient(135deg, #273c75, #4cbfff);
            flex: 0 0 auto;
        }

        .favorite-card h3 {
            margin: 0;
            color: #22304a;
            font-size: 16px;
            line-height: 1.25;
        }

        .favorite-card p {
            margin: 0;
            color: #66758c;
            font-size: 13px;
            line-height: 1.55;
        }

        .favorite-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: auto;
            color: #718096;
            font-size: 12px;
        }

        .favorite-meta span {
            padding: 4px 8px;
            border-radius: 999px;
            background: #f3f6fb;
        }

        .favorite-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .favorite-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .favorite-preview span {
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 4px 7px;
            border-radius: 5px;
            color: #43546d;
            background: #f5f7fb;
            font-size: 12px;
            font-weight: 700;
        }

        .favorites-empty {
            min-height: 360px;
            display: grid;
            place-items: center;
            text-align: center;
            color: #64748b;
            border: 1px dashed #c8d3e3;
            border-radius: 10px;
            background: #fff;
        }

        .favorites-empty i {
            color: #273c75;
            font-size: 36px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar compact-sidebar">
        <a href="index.html"><i class="fas fa-home"></i><span>主页</span></a>
        <a href="data-upload.html"><i class="fas fa-upload"></i><span>数据上传</span></a>
        <a href="data-preparation.html"><i class="fas fa-cogs"></i><span>数据准备</span></a>
        <a href="statistical-analysis.html"><i class="fas fa-chart-bar"></i><span>统计分析</span></a>
        <a href="causal-analysis.html"><i class="fas fa-brain"></i><span>数据驱动因果</span></a>
        <a href="big-model-analysis.html"><i class="fas fa-database"></i><span>语义理解因果</span></a>
        <a href="favorites.html"><i class="fas fa-star"></i><span>收藏夹</span></a>
        {% include 'partials/sidebar_user.html' %}
    </div>
    <main class="favorites-page">
        <section class="favorites-hero">
            <div>
                <h1>收藏夹</h1>
                <p>集中管理你保存的图表配置、语义分析结果和关键工作视图。</p>
            </div>
            <div class="favorites-toolbar">
                <button onclick="location.href='statistical-analysis.html'"><i class="fas fa-chart-line"></i> 继续分析</button>
                <button class="secondary" onclick="location.href='big-model-analysis.html'"><i class="fas fa-database"></i> 语义分析</button>
            </div>
        </section>
        <section class="favorites-filterbar">
            <input id="favorite-keyword" type="search" placeholder="搜索标题、说明或字段">
            <select id="favorite-kind">
                <option value="">全部类型</option>
                <option value="chart">统计图表</option>
                <option value="causal_job">因果任务</option>
                <option value="semantic_report">语义报告</option>
                <option value="dataset_view">数据视图</option>
            </select>
            <select id="favorite-sort">
                <option value="-created_at">最近收藏</option>
                <option value="title">标题 A-Z</option>
                <option value="sort_order">自定义排序</option>
            </select>
        </section>
        <section id="favorites-content" class="favorites-grid"></section>
    </main>
</div>
<script>
    const kindConfig = {
        chart: { icon: 'fa-chart-line', label: '统计图表', url: 'statistical-analysis.html' },
        causal_job: { icon: 'fa-brain', label: '因果任务', url: 'causal-analysis.html' },
        semantic_report: { icon: 'fa-project-diagram', label: '语义报告', url: 'big-model-analysis.html' },
        dataset_view: { icon: 'fa-table', label: '数据视图', url: 'data-preparation.html' },
        semantic: { icon: 'fa-project-diagram', label: '语义因果', url: 'big-model-analysis.html' },
        note: { icon: 'fa-sticky-note', label: '记录', url: 'index.html' }
    };

    let allFavorites = [];

    function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, char => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[char]));
    }

    function formatTime(value) {
        if (!value) return '-';
        return new Date(value).toLocaleString('zh-CN', { hour12: false });
    }

    function favoriteChartConfig(item) {
        const payload = item.payload || {};
        const snapshot = item.snapshot || {};
        if (payload.chartType || payload.dropData) {
            return payload;
        }
        if (snapshot.chartType || snapshot.dropData) {
            return snapshot;
        }
        return null;
    }

    function renderFavoritePreview(item) {
        const config = favoriteChartConfig(item);
        if (!config) {
            return '';
        }
        const dropData = config.dropData || {};
        return `
            <div class="favorite-preview">
                <span>${escapeHtml(config.chartType || 'chart')}</span>
                ${dropData.x ? `<span>X: ${escapeHtml(dropData.x)}</span>` : ''}
                ${dropData.y ? `<span>Y: ${escapeHtml(dropData.y)}</span>` : ''}
                ${dropData.color ? `<span>颜色: ${escapeHtml(dropData.color)}</span>` : ''}
            </div>
        `;
    }

    function renderFavorites(items) {
        const container = document.getElementById('favorites-content');
        if (!items.length) {
            container.className = 'favorites-empty';
            container.innerHTML = `
                <div>
                    <i class="fas fa-star"></i>
                    <h2>还没有收藏内容</h2>
                    <p>在统计分析页收藏图表配置，或在语义因果页收藏分析结果。</p>
                </div>
            `;
            return;
        }
        container.className = 'favorites-grid';
        container.innerHTML = items.map(item => {
            const config = kindConfig[item.kind] || kindConfig.note;
            const groupName = item.group_name ? `<span>${escapeHtml(item.group_name)}</span>` : '';
            return `
                <article class="favorite-card" data-id="${item.id}">
                    <header>
                        <div class="favorite-icon"><i class="fas ${config.icon}"></i></div>
                        <div>
                            <h3>${escapeHtml(item.title)}</h3>
                            <p>${escapeHtml(item.description || '无描述')}</p>
                        </div>
                    </header>
                    ${renderFavoritePreview(item)}
                    <div class="favorite-meta">
                        <span>${config.label}</span>
                        ${groupName}
                        <span>${escapeHtml(formatTime(item.created_at))}</span>
                    </div>
                    <div class="favorite-actions">
                        <button class="secondary" onclick="openFavorite('${item.id}')">打开</button>
                        <button onclick="deleteFavorite('${item.id}')">删除</button>
                    </div>
                </article>
            `;
        }).join('');
    }

    function applyFavoriteFilters() {
        const keyword = document.getElementById('favorite-keyword').value.trim().toLowerCase();
        const kind = document.getElementById('favorite-kind').value;
        const sort = document.getElementById('favorite-sort').value;
        let items = [...allFavorites];
        if (kind) {
            items = items.filter(item => item.kind === kind);
        }
        if (keyword) {
            items = items.filter(item => {
                const config = favoriteChartConfig(item);
                const dropData = config?.dropData || {};
                return [
                    item.title,
                    item.description,
                    item.group_name,
                    dropData.x,
                    dropData.y,
                    dropData.color
                ].some(value => String(value || '').toLowerCase().includes(keyword));
            });
        }
        items.sort((a, b) => {
            if (sort === 'title') {
                return String(a.title || '').localeCompare(String(b.title || ''), 'zh-CN');
            }
            if (sort === 'sort_order') {
                return (a.sort_order || 0) - (b.sort_order || 0);
            }
            return new Date(b.created_at || 0) - new Date(a.created_at || 0);
        });
        renderFavorites(items);
    }

    function loadFavorites() {
        const container = document.getElementById('favorites-content');
        container.className = 'favorites-empty';
        container.innerHTML = '<div><i class="fas fa-spinner fa-spin"></i><p>正在加载收藏...</p></div>';
        fetch('/api/favorites')
            .then(response => response.json())
            .then(items => {
                allFavorites = Array.isArray(items) ? items : [];
                applyFavoriteFilters();
            })
            .catch(() => {
                container.innerHTML = '<div><i class="fas fa-exclamation-circle"></i><p>收藏加载失败，请稍后重试。</p></div>';
            });
    }

    function openFavorite(id) {
        const item = allFavorites.find(entry => entry.id === id);
        if (!item) {
            return;
        }
        const config = kindConfig[item.kind] || kindConfig.note;
        if (item.kind === 'chart') {
            sessionStorage.setItem('causai:favoriteChart', JSON.stringify(item));
        }
        location.href = config.url;
    }

    function deleteFavorite(id) {
        if (!confirm('确定删除这条收藏吗？')) {
            return;
        }
        fetch(`/api/favorites/${id}`, { method: 'DELETE' })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    loadFavorites();
                } else {
                    alert(data.message || '删除失败');
                }
            })
            .catch(() => alert('删除失败，请稍后重试'));
    }

    document.getElementById('favorite-keyword').addEventListener('input', applyFavoriteFilters);
    document.getElementById('favorite-kind').addEventListener('change', applyFavoriteFilters);
    document.getElementById('favorite-sort').addEventListener('change', applyFavoriteFilters);
    loadFavorites();
</script>
<script src="{{ url_for('static', filename='js/app-settings.js') }}"></script>
</body>
</html>
